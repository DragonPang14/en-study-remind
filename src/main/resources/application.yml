server:
  port: 8080

spring:
  application:
    name: en-study-remind
  datasource:
    url: jdbc:h2:file:./src/main/resources/db/english;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true # 开启 H2 网页控制台，访问 http://localhost:8080/h2-console
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update # 自动建表
    show-sql: false

